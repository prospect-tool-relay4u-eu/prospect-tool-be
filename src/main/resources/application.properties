spring.application.name=eu-relay-4u-prospecting-be
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eu_relay_4u_prospecting}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=create-drop
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

jwt.expiration.in.hours=24
jwt.secret=${JWT_SECRET:polkmiujhbtrfdxsqsdxcwedfgvbthjm}

# Security Hardening
security.password.pepper=${PASSWORD_PEPPER:super-secret-pepper-change-me-in-prod}
security.lockout.max-attempts=5
security.lockout.duration-minutes=10

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# Resend Email Service
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL}

# Email Verification
verification.code.expiry-minutes=15
verification.code.max-attempts=5
verification.resend.max-per-hour=3
