name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGION: europe-west1
  REPO: relay4u-repo
  SERVICE: relay4u-be-prod
  DB_NAME: relay4u_prod
  INSTANCE: relay4u-db

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/relay4u-be:${{ github.ref_name }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Create env vars file (non-secret values)
        env:
          ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          INSTANCE_CONN="${PROJECT_ID}:${{ env.REGION }}:${{ env.INSTANCE }}"
          DB_URL="jdbc:postgresql:///${{ env.DB_NAME }}?cloudSqlInstance=${INSTANCE_CONN}&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
          printf 'SPRING_PROFILES_ACTIVE: "prod"\n'    > env-prod.yaml
          printf 'DB_USERNAME: "appuser"\n'            >> env-prod.yaml
          printf 'DB_URL: "%s"\n' "$DB_URL"            >> env-prod.yaml
          printf 'ALLOWED_ORIGINS: "%s"\n' "$ALLOWED_ORIGINS" >> env-prod.yaml

      - name: Deploy to Cloud Run (Production)
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/relay4u-be:${{ github.ref_name }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances "${PROJECT_ID}:${{ env.REGION }}:${{ env.INSTANCE }}" \
            --env-vars-file env-prod.yaml \
            --set-secrets "DB_PASSWORD=DB_PASSWORD_PROD:latest,JWT_SECRET=JWT_SECRET_PROD:latest,PASSWORD_PEPPER=PASSWORD_PEPPER_PROD:latest" \
            --min-instances 1 \
            --max-instances 10 \
            --quiet
